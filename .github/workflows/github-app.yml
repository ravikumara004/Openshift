on:
  push:
    branches:
      - main # test#

jobs:
  generate-token:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          owner: ravikumara004
          repositories: private-test
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ravikumara004/private-test
          token: ${{ steps.generate_token.outputs.token }}
          path: private-test
        
      - name: Clone another repo
        run: |
          ls -al
          echo "${{ steps.generate_token.outputs.token }}"
          git clone https://x-access-token:${{ steps.generate_token.outputs.token }}@github.com/ravikumara004/private-test.git
          ls -al
